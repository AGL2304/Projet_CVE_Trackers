services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: cve-tracker-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://cve_tracker:cve_tracker@pgbouncer:5432/cve_tracker
      - REDIS_URL=redis://redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - REPORTS_DIR=/app/data/reports
    command: ["sh", "-c", "bun run db:generate && bun run dev"]
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - reports-data-dev:/app/data/reports
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started
    restart: unless-stopped
    networks:
      - cve-tracker-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=cve_tracker
      - POSTGRES_USER=cve_tracker
      - POSTGRES_PASSWORD=cve_tracker
    ports:
      - "5433:5432"
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cve_tracker -d cve_tracker"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cve-tracker-network

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      - DB_USER=cve_tracker
      - DB_PASSWORD=cve_tracker
      - DB_HOST=postgres
      - DB_NAME=cve_tracker
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=200
      - DEFAULT_POOL_SIZE=20
      - AUTH_TYPE=scram-sha-256
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "5432"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cve-tracker-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: cve-tracker-worker-dev
    command: ["sh", "-c", "bun run db:generate && node backend/scripts/worker.js"]
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://cve_tracker:cve_tracker@pgbouncer:5432/cve_tracker
      - REDIS_URL=redis://redis:6379
      - WORKER_POLL_INTERVAL_MS=15000
      - NVD_AUTO_SYNC_ENABLED=true
      - NVD_FULL_SYNC_INTERVAL_MS=86400000
      - NVD_DELTA_INTERVAL_MS=900000
      - NVD_DELTA_LOOKBACK_HOURS=24
      - NVD_PAGE_SIZE=200
      - NVD_BOOT_MAX_RECORDS=500
      - NVD_API_KEY=${NVD_API_KEY:-}
      - REPORTS_DIR=/app/data/reports
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - reports-data-dev:/app/data/reports
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - cve-tracker-network

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data-dev:/data
    networks:
      - cve-tracker-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elastic-data-dev:/usr/share/elasticsearch/data
    networks:
      - cve-tracker-network

volumes:
  node_modules:
  postgres-data-dev:
  redis-data-dev:
  elastic-data-dev:
  reports-data-dev:

networks:
  cve-tracker-network:
    driver: bridge
