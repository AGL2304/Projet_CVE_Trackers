# ─────────────────────────────────────────────────────────────────────────────
# CVE Tracker — reverse-proxy front (Nginx)
#
# Goals:
#   • forward traffic to the Next.js app (service: app:3000)
#   • neutralize spoofable identity headers (x-user-id, x-user-email)
#     and any caller-provided X-Forwarded-* that we re-set ourselves
#   • enforce a single trusted X-Forwarded-For chain from $proxy_add_x_forwarded_for
#   • set conservative timeouts / body limits / hardening headers
# ─────────────────────────────────────────────────────────────────────────────

# Reasonable defaults for an internal SOC tool. Tune for your traffic profile.
proxy_read_timeout      60s;
proxy_send_timeout      60s;
proxy_connect_timeout   10s;

# Real IP — trust the immediate hop. When running behind another LB,
# set 'set_real_ip_from <lb-cidr>;' and 'real_ip_header X-Forwarded-For;'.
real_ip_header          X-Forwarded-For;
real_ip_recursive       on;

server {
  listen 80 default_server;
  server_name _;

  client_max_body_size 20m;

  # Hardening response headers (defense in depth; app also sets some of these).
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Hide nginx version
  server_tokens off;

  location / {
    # ── Strip any incoming identity / forwarding headers a caller might
    #    attempt to inject. The application must derive identity from
    #    its own signed admin session cookie or upstream auth — never
    #    from raw HTTP headers on the public edge.
    proxy_set_header X-User-Id          "";
    proxy_set_header X-User-Email       "";
    proxy_set_header X-User-Role        "";
    proxy_set_header X-Forwarded-Host   $host;
    proxy_set_header X-Forwarded-Server $host;

    # ── Forward to the app
    proxy_pass http://app:3000;
    proxy_http_version 1.1;

    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_buffering        on;
    proxy_request_buffering on;
  }

  # Block obvious admin path scanning at the edge (cheap deterrent).
  location ~ ^/(\.git|\.env|\.svn|\.well-known/security\.txt) {
    deny all;
  }
}
