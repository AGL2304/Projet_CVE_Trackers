
services:
  # CVE Tracker Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cve-tracker-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./db/dev.db
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    volumes:
      - db-data:/app/db
      - logs:/app/logs
    depends_on:
      - db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database with Initial Data
  db:
    image: postgres:15-alpine
    container_name: cve-tracker-db
    environment:
      - POSTGRES_DB=cve_tracker
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST_AUTH_METHOD=trust
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/initial_data.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  db-data:
    driver: local
  postgres-data:
    driver: local

networks:
  default:
    driver: bridge
